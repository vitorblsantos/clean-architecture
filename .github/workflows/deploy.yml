name: CD - Deploy (Development)
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-development:
    runs-on: ubuntu-latest
    environment: development
    env:
      GCP_PROJECT_ID: ${{ vars.TF_GCP_PROJECT_ID }}
      GCR_HOST: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      GCR_EMAIL: ${{ vars.GCP_SA_EMAIL }}
      CLOUD_RUN_REGION: ${{ vars.GCP_CLOUD_RUN_REGION }}
      IMAGE_NAME: ${{ vars.GCP_IMAGE_NAME }}
      CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE_NAME }}
      NODE_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_SA }}
          project_id: ${{ vars.TF_GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker "${GCR_HOST}" --quiet

      - name: Build and push image
        run: |
          IMAGE_BASE="${GCR_HOST}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          IMAGE_REF="${IMAGE_BASE}:${GITHUB_SHA}"
          docker build -t "$IMAGE_REF" -t "${IMAGE_BASE}:latest" -f Dockerfile .
          docker push "$IMAGE_REF"
          docker push "${IMAGE_BASE}:latest"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          APP_HOST: ${{ vars.APP_HOST }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_SCHEMA: ${{ secrets.DATABASE_SCHEMA }}
          DATABASE_SYNCHRONIZE: ${{ vars.DATABASE_SYNCHRONIZE }}
          DATABASE_USER: ${{ secrets.DATABASE_USER }}
          NODE_ENV: development
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_SERVICE_ACCOUNT_PACKAGE }}
          HUBSPOT_ACCOUNT_ID: ${{ secrets.HUBSPOT_ACCOUNT_ID }}
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
        run: |
          SERVICE="${CLOUD_RUN_SERVICE}"
          ruby -ryaml -e '
            keys = %w[
              APP_HOST DATABASE_HOST DATABASE_NAME DATABASE_PASSWORD
              DATABASE_PORT DATABASE_SCHEMA DATABASE_SYNCHRONIZE DATABASE_USER
              NODE_ENV GITHUB_TOKEN HUBSPOT_ACCOUNT_ID HUBSPOT_PERSONAL_ACCESS_KEY
            ]
            env = keys.each_with_object({}) { |k, h| h[k] = ENV.fetch(k, "") }
            File.write("/tmp/cloudrun-env.yaml", YAML.dump(env))
          '
          gcloud run services update "$SERVICE" \
            --project="${GCP_PROJECT_ID}" \
            --region="${CLOUD_RUN_REGION}" \
            --image="${IMAGE_REF}" \
            --service-account="${GCR_EMAIL}" \
            --env-vars-file=/tmp/cloudrun-env.yaml
          rm -f /tmp/cloudrun-env.yaml
