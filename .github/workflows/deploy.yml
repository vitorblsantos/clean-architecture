name: CD - Deploy (Development)
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-development:
    runs-on: ubuntu-latest
    environment: development
    env:
      ARTIFACT_REGISTRY_REGION: ${{ vars.ARTIFACT_REGISTRY_REGION }}
      ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}
      CLOUD_RUN_EMAIL: ${{ vars.GCP_CLOUD_RUN_EMAIL }}
      CLOUD_RUN_REGION: ${{ vars.GCP_CLOUD_RUN_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE_NAME }}
      DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_SCHEMA: ${{ secrets.DATABASE_SCHEMA }}
      DATABASE_SYNCHRONIZE: ${{ vars.DATABASE_SYNCHRONIZE }}
      DATABASE_TIMEZONE: ${{ vars.DATABASE_TIMEZONE }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      HOST: ${{ vars.HOST }}
      IMAGE_NAME: ${{ vars.GCP_IMAGE_NAME }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_TASKS_LOCATION: ${{ vars.GCP_TASKS_LOCATION }}
      NODE_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_SA }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |-
          ARTIFACT_REGISTRY_HOST="${ARTIFACT_REGISTRY_REGION}-docker.pkg.dev"
          IMAGE_REF="${ARTIFACT_REGISTRY_HOST}/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${IMAGE_NAME}:${GITHUB_SHA}"
          gcloud auth configure-docker "$ARTIFACT_REGISTRY_HOST" --quiet
          docker build -t "$IMAGE_REF" -f Dockerfile .
          docker push "$IMAGE_REF"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |-
          jq -nr \
            --arg HOST "$HOST" \
            --arg DATABASE_HOST "$DATABASE_HOST" \
            --arg DATABASE_NAME "$DATABASE_NAME" \
            --arg DATABASE_PASSWORD "$DATABASE_PASSWORD" \
            --arg DATABASE_PORT "$DATABASE_PORT" \
            --arg DATABASE_SCHEMA "$DATABASE_SCHEMA" \
            --arg DATABASE_SYNCHRONIZE "$DATABASE_SYNCHRONIZE" \
            --arg DATABASE_TIMEZONE "$DATABASE_TIMEZONE" \
            --arg DATABASE_USER "$DATABASE_USER" \
            --arg GCP_PROJECT_ID "$GCP_PROJECT_ID" \
            --arg GCP_TASKS_LOCATION "$GCP_TASKS_LOCATION" \
            --arg NODE_ENV "$NODE_ENV" 
            '{
              HOST:$HOST,
              DATABASE_HOST:$DATABASE_HOST,
              DATABASE_NAME:$DATABASE_NAME,
              DATABASE_PASSWORD:$DATABASE_PASSWORD,
              DATABASE_PORT:$DATABASE_PORT,
              DATABASE_SCHEMA:$DATABASE_SCHEMA,
              DATABASE_SYNCHRONIZE:$DATABASE_SYNCHRONIZE,
              DATABASE_TIMEZONE:$DATABASE_TIMEZONE,
              DATABASE_USER:$DATABASE_USER,
              GCP_PROJECT_ID:$GCP_PROJECT_ID,
              GCP_TASKS_LOCATION:$GCP_TASKS_LOCATION,
              NODE_ENV:$NODE_ENV,
            } | to_entries | map("\(.key): \(.value | @json)") | join("\n")' \
            > /tmp/env.yaml

          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE_REF" \
            --region "$CLOUD_RUN_REGION" \
            --service-account "$CLOUD_RUN_EMAIL" \
            --platform managed \
            --network "default" \
            --subnet "default" \
            --vpc-egress "private-ranges-only" \
            --env-vars-file=/tmp/env.yaml

      - name: Route traffic to latest revision
        run: |-
          gcloud run services update-traffic "$CLOUD_RUN_SERVICE" \
            --region "$CLOUD_RUN_REGION" \
            --to-latest
