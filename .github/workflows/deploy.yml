name: CD - Deploy (Development)
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-development:
    runs-on: ubuntu-latest
    environment: development
    env:
      APP_HOST: ${{ vars.APP_HOST }}
      DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_SCHEMA: ${{ secrets.DATABASE_SCHEMA }}
      DATABASE_SYNCHRONIZE: ${{ vars.DATABASE_SYNCHRONIZE }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      GCP_PROFILE_UPDATE_QUEUE: ${{ vars.GCP_PROFILE_UPDATE_QUEUE }}
      GCP_PROFILE_UPDATE_TASK_URL: ${{ vars.GCP_PROFILE_UPDATE_TASK_URL }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_TASKS_LOCATION: ${{ vars.GCP_TASKS_LOCATION }}
      GCR_HOST: ${{ vars.GCP_ARTIFACT_REGISTRY_REPOSITORY }}
      GCR_EMAIL: ${{ vars.GCP_SA_EMAIL }}
      CLOUD_RUN_REGION: ${{ vars.GCP_CLOUD_RUN_REGION }}
      IMAGE_NAME: ${{ vars.GCP_IMAGE_NAME }}
      CLOUD_RUN_SERVICE: ${{ vars.GCP_CLOUD_RUN_SERVICE_NAME }}
      NODE_ENV: development
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_SA }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image
        run: |
          gcloud auth configure-docker "$GCR_HOST" --quiet
          export IMAGE_REF="$GCR_HOST/$GCP_PROJECT_ID/$IMAGE_NAME:$GITHUB_SHA"
          docker build -t "$IMAGE_REF" -f Dockerfile .
          docker push "$IMAGE_REF"
          echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE_REF" \
            --region "$CLOUD_RUN_REGION" \
            --service-account "$GCR_EMAIL" \
            --platform managed \
            --set-env-vars="^|^APP_HOST=$APP_HOST|DATABASE_HOST=$DATABASE_HOST|DATABASE_NAME=$DATABASE_NAME|DATABASE_PASSWORD=$DATABASE_PASSWORD|DATABASE_PORT=$DATABASE_PORT|DATABASE_SCHEMA=$DATABASE_SCHEMA|DATABASE_SYNCHRONIZE=$DATABASE_SYNCHRONIZE|DATABASE_USER=$DATABASE_USER|GCP_PROFILE_UPDATE_QUEUE=$GCP_PROFILE_UPDATE_QUEUE|GCP_PROFILE_UPDATE_TASK_URL=$GCP_PROFILE_UPDATE_TASK_URL|GCP_PROJECT_ID=$GCP_PROJECT_ID|GCP_TASKS_LOCATION=$GCP_TASKS_LOCATION|NODE_ENV=$NODE_ENV"

      - name: Route traffic to latest revision
        run: |-
          gcloud run services update-traffic "$CLOUD_RUN_SERVICE" \
            --region "$CLOUD_RUN_REGION" \
            --to-latest
