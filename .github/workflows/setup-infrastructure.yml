name: Infra - Setup

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_project_number: ${{ vars.TF_GCP_PROJECT_NUMBER }}
  TF_VAR_image: ${{ vars.TF_CONTAINER_IMAGE }}
  TF_VAR_domain: ${{ vars.TF_DOMAIN }}

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: development
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate service account
        env:
          GCP_SA_JSON: ${{ secrets.GCP_TERRAFORM_SA }}
          GCP_PROJECT_ID: ${{ vars.TF_GCP_PROJECT_ID }}
        run: |
          printf '%s' "$GCP_SA_JSON" > /tmp/gcloud-sa.json
          gcloud auth activate-service-account --key-file /tmp/gcloud-sa.json
          gcloud config set project "$GCP_PROJECT_ID"
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-sa.json" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.0'

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -no-color tfplan
