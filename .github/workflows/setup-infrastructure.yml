name: Infra - Setup

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_VAR_project_id: ${{ vars.TF_GCP_PROJECT_ID }}
  TF_VAR_project_number: ${{ vars.TF_GCP_PROJECT_NUMBER }}
  TF_VAR_image: ${{ vars.TF_CONTAINER_IMAGE }}
  TF_VAR_domain: ${{ vars.TF_DOMAIN }}

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: development
    env:
      GCP_WIF: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SA: ${{ secrets.GCP_TERRAFORM_SA != '' && secrets.GCP_TERRAFORM_SA || vars.GCP_TERRAFORM_SA }}
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.0'

      - name: Check GCP auth configuration
        run: |
          if [ -z "$GCP_WIF" ] || [ -z "$GCP_SA" ]; then
            echo "::error::Defina GCP_WORKLOAD_IDENTITY_PROVIDER e GCP_TERRAFORM_SA (Secrets ou Variables no repositório ou no environment deste job)."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WIF }}
          service_account: ${{ env.GCP_SA }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color
