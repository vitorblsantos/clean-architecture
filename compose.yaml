networks:
  app:
    driver: bridge
    name: clean-arch-app

services:
  adminer:
    image: adminer
    restart: always
    ports:
      - '9091:8080'
    networks:
      - app

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: app
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-local}
      PORT: ${PORT:-8080}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_DB:-clean-arch}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-public}
      DATABASE_SYNCHRONIZE: ${DATABASE_SYNC:-true}
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-clean-arch}
    image: clean-arch:latest
    networks:
      - app
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    restart: on-failure

  kafka:
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 10
    image: confluentinc/cp-kafka:7.4.4
    networks:
      - app
    ports:
      - '29092:29092'

  kafka-ui:
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_NAME: local
    image: provectuslabs/kafka-ui:latest
    networks:
      - app
    ports:
      - '9090:8080'

  postgres:
    container_name: database
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-clean-arch}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    image: postgres:latest
    networks:
      - app
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - db:/var/lib/postgresql

  zookeeper:
    container_name: zookeeper
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    image: confluentinc/cp-zookeeper:7.4.4
    networks:
      - app

volumes:
  db:
  kafka:
