networks:
  clean-arch-network:
    driver: bridge
    name: clean-arch-network

services:
  adminer:
    image: adminer
    networks:
      - clean-arch-network
    ports:
      - '8081:8080'
    profiles: [dev]
    restart: always

  clean-arch-app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: clean-arch-app
    depends_on:
      kafka:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-local}
      PORT: ${PORT:-8080}
    env_file:
      - .env
    extra_hosts:
      - host.docker.internal:host-gateway
    image: clean-arch-app:latest
    networks:
      - clean-arch-network
    ports:
      - '${PORT:-8080}:${PORT:-8080}'
    restart: unless-stopped

  kafka:
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 10
    image: confluentinc/cp-kafka:7.4.4
    networks:
      - clean-arch-network
    ports:
      - '29092:29092'
    restart: unless-stopped

  kafka-ui:
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_NAME: local
    image: provectuslabs/kafka-ui:latest
    networks:
      - clean-arch-network
    ports:
      - '8082:8080'
    profiles: [dev]
  

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - clean-arch-network
    ports:
      - '${OLLAMA_PORT:-11434}:11434'
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_NUM_THREADS: ${OLLAMA_NUM_THREADS:-4}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - clean-arch-network
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_CUSTOM_MODEL: ${OLLAMA_CUSTOM_MODEL:-data-quality}
    volumes:
      - ./Modelfile:/Modelfile:ro
    entrypoint: >
      /bin/sh -c "
        echo \"Baixando modelo base $${OLLAMA_MODEL}...\";
        ollama pull \"$${OLLAMA_MODEL}\";
        echo \"Criando modelo customizado $${OLLAMA_CUSTOM_MODEL}...\";
        ollama create \"$${OLLAMA_CUSTOM_MODEL}\" -f /Modelfile;
        echo 'Modelos prontos!';
      "
    restart: 'no'

  postgres:
    container_name: database
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-argus}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DATABASE_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5
    image: postgres:16-alpine
    networks:
      - clean-arch-network
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    profiles: [dev]
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql

  redis:
    container_name: redis
    environment:
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-1234}
      REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}
      REDIS_TLS_REJECT_UNAUTHORIZED: ${REDIS_TLS_REJECT_UNAUTHORIZED:-false}
    image: redis:7-alpine
    networks:
      - clean-arch-network
    ports:
      - '${REDIS_PORT:-6379}:6379'
    profiles: [dev]
    restart: unless-stopped

  zookeeper:
    container_name: zookeeper
    ports:
      - '2181:2181'
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    image: confluentinc/cp-zookeeper:7.4.4
    networks:
      - clean-arch-network
    restart: unless-stopped

volumes:
  db:
  ollama: